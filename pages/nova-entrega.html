<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Entrega</title>
  <meta name="theme-color" content="#3b82f6">
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/nova-entrega.css">
  <link rel="stylesheet" href="../css/menu.css">
</head>
<body>

<header class="top-bar">
  <h1>NOVA ENTREGA</h1>
  <button class="logout-btn" onclick="logout()">Sair</button>
</header>

<div class="card">

  <form id="formEntrega">

    <!-- Loja -->
    <div class="campo">
      <label>🏬 Loja de Saída</label>
      <select id="loja">
        <option value="">Selecione a loja de onde sairá a entrega</option>
        <option value="Centro">Loja Centro</option>
        <option value="Jardins">Loja Jardins</option>
        <option value="Siqueira">Siqueira Campos</option>
        <option value="São José">São José</option>
      </select>
    </div>

    <!-- Vendedor -->
    <div class="campo">
      <label>👤 Vendedor</label>
      <input id="vendedor" type="text" placeholder="Selecione o vendedor">
    </div>

    <!-- Destino -->
    <div class="campo">
      <label>📍 Destino da Entrega</label>
      <input id="destino" type="text" placeholder="Nome do cliente ou endereço completo">
    </div>

    <div class="campo">
      <label>☎ Telefone</label>
      <input id="telefone" type="tel" placeholder="Telefone para contato">
    </div>

    <div class="campo">
      <label>📌 Localização da entrega</label>
      <div class="coordenadas-grid">
        <input id="latitude" type="number" step="any" placeholder="Latitude">
        <input id="longitude" type="number" step="any" placeholder="Longitude">
      </div>
      <button type="button" class="btn-localizacao" id="btnLocalizacaoAtual">Usar minha localização atual</button>
      <p class="mensagem-localizacao" id="mensagemLocalizacao"></p>
    </div>

    <div class="campo">
      <label>🏍 Entregador</label>
      <select id="entregador">
        <option value="">Selecione um entregador ativo</option>
      </select>
    </div>




    <!-- Forma de Pagamento -->
<div class="campo">
  <label>💳 Pagamento</label>
  <select id="formaPagamento" required>
    <option value="">Selecione a forma de pagamento</option>
    <option value="PIX">PIX</option>
    <option value="Crédito">Crédito</option>
    <option value="Débito">Débito</option>
    <option value="Dinheiro">Dinheiro</option>
  </select>
</div>

<!-- Status do Pagamento -->
<div class="campo">
  <label>📌 Status do Pagamento</label>
  <div class="toggle">
    <button type="button" class="ativo" id="btnPago">✔ Pago</button>
    <button type="button" id="btnReceber">⏱ A receber</button>
  </div>
  <input type="hidden" id="pagamento" value="Pago">
</div>

    <!-- Pagamento -->
   

    <!-- Observação -->
    <div class="campo">
      <label>📝 Observação (opcional)</label>
      <textarea id="obs" placeholder="Ex: Casa azul, chamar no WhatsApp"></textarea>
    </div>

    <!-- Botões -->
    <button type="submit" class="btn-salvar">+ Registrar Entrega</button>
    <button type="button" class="btn-cancelar" onclick="history.back()">Cancelar</button>

  </form>
</div>

<script src="../js/auth.js"></script>
<script src="../js/menu.js"></script>
<script src="../js/notificacoes-core.js"></script>
<script src="../js/nova-entrega.js"></script>
<script src="../js/pwa.js"></script>
</body>
</html>
