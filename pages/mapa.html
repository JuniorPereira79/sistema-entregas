<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Entregas</title>
  <meta name="theme-color" content="#3b82f6">
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../css/mapa.css">
</head>
<body>
  <header class="top-bar">
    <button class="nav-btn esquerda" onclick="window.location.href='dashboard.html'">Dashboard</button>
    <h1>MAPA DE ENTREGAS</h1>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </header>

  <main class="app-container">
    <section class="mapa-card">
      <div class="mapa-header">
        <div>
          <h2>Localização das entregas</h2>
          <p id="resumoMapa">Carregando entregas com localização...</p>
        </div>
        <button class="nav-btn" onclick="window.location.href='entregas.html'">Ver entregas</button>
      </div>

      <p class="mensagem-vazia" id="mensagemMapaVazio">
        Nenhuma entrega com latitude e longitude válidas foi encontrada.
      </p>

      <div id="mapa"></div>
    </section>
  </main>

  <script src="../js/auth.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/mapa.js"></script>
  <script src="../js/pwa.js"></script>
</body>
</html>
