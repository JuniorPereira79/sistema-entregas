<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios</title>
  <meta name="theme-color" content="#3b82f6">
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/relatorios.css">
</head>
<body>
  <header class="top-bar">
    <button class="nav-btn esquerda" onclick="window.location.href='dashboard.html'">Dashboard</button>
    <h1>RELATÓRIOS</h1>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </header>

  <main class="app-container">
    <section class="filtros">
      <div class="campo">
        <label for="dataInicial">Data inicial</label>
        <input id="dataInicial" type="date">
      </div>

      <div class="campo">
        <label for="dataFinal">Data final</label>
        <input id="dataFinal" type="date">
      </div>

      <div class="campo">
        <label for="filtroStatus">Status</label>
        <select id="filtroStatus">
          <option value="todos">Todos</option>
          <option value="pendente">Pendente</option>
          <option value="em-rota">Em rota</option>
          <option value="entregue">Entregue</option>
          <option value="cancelada">Cancelada</option>
        </select>
      </div>

      <div class="campo">
        <label for="filtroEntregador">Entregador</label>
        <select id="filtroEntregador">
          <option value="todos">Todos</option>
        </select>
      </div>

      <button class="btn-limpar" id="btnLimparFiltros">Limpar filtros</button>
      <button class="btn-exportar" id="btnExportarCsv">Exportar CSV</button>
      <button class="btn-pdf" id="btnExportarPdf">Exportar PDF</button>
    </section>

    <section class="indicadores">
      <div class="indicador">
        <span id="totalFiltrado">0</span>
        <p>Total filtrado</p>
      </div>
      <div class="indicador">
        <span id="totalPendentes">0</span>
        <p>Pendentes</p>
      </div>
      <div class="indicador">
        <span id="totalEmRota">0</span>
        <p>Em rota</p>
      </div>
      <div class="indicador">
        <span id="totalEntregues">0</span>
        <p>Entregues</p>
      </div>
      <div class="indicador">
        <span id="totalCanceladas">0</span>
        <p>Canceladas</p>
      </div>
    </section>

    <section class="tabela-card">
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Cliente</th>
              <th>Endereço</th>
              <th>Telefone</th>
              <th>Entregador</th>
              <th>Status</th>
              <th>Data de criação</th>
              <th>Data de conclusão</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaRelatorios"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../js/relatorios.js"></script>
  <script src="../js/pwa.js"></script>
</body>
</html>
