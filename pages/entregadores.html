<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entregadores</title>
  <meta name="theme-color" content="#3b82f6">
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/entregadores.css">
  <link rel="stylesheet" href="../css/menu.css">
</head>
<body>
  <header class="top-bar">
    <button class="voltar-btn" onclick="window.location.href='entregas.html'">Voltar</button>
    <h1>ENTREGADORES</h1>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </header>

  <main class="app-container">
    <section class="card">
      <form id="formEntregador">
        <input type="hidden" id="entregadorId">

        <div class="campo">
          <label for="nome">Nome</label>
          <input id="nome" type="text" placeholder="Nome do entregador" required>
        </div>

        <div class="campo">
          <label for="telefone">Telefone</label>
          <input id="telefone" type="tel" placeholder="Telefone para contato" required>
        </div>

        <div class="campo">
          <label for="veiculo">Veículo</label>
          <input id="veiculo" type="text" placeholder="Ex: Moto, carro, bicicleta" required>
        </div>

        <div class="campo">
          <label for="placa">Placa</label>
          <input id="placa" type="text" placeholder="Placa do veículo">
        </div>

        <div class="campo">
          <label for="status">Status</label>
          <select id="status">
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
          </select>
        </div>

        <button type="submit" class="btn-salvar" id="btnSalvar">Cadastrar entregador</button>
        <button type="button" class="btn-cancelar" id="btnCancelarEdicao">Cancelar edição</button>
      </form>
    </section>

    <section class="lista-entregadores" id="listaEntregadores"></section>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/entregadores.js"></script>
  <script src="../js/pwa.js"></script>
</body>
</html>
